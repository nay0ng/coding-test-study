name: Python application

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: 3.9
    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    - name: run code
      run: |
        cd workbook
        python actions.py
    - name: commits
      run: |
        git config --local user.email "nayoung32918@gmail.com"
        git config --local user.name "nay0ng"
        git add .
        git diff --cached --quiet || git commit -m "[bot]auto workbook update"
    - name: push
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
